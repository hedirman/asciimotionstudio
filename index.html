<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascii Motion Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-title-wrap">
          <h1 class="hero-title">Ascii Motion Studio</h1>
        </div>
      </header>

      <main class="layout">
        <section class="panel controls-panel">
          <label class="upload" for="video-input">
            <input id="video-input" type="file" accept="video/*" />
            <small id="video-meta"></small>
            <span id="upload-prompt">Drop video here or click to browse</span>
          </label>

          <div class="control-grid">
            <label>
              <span class="label-row">Resolution<button type="button" class="info-icon" aria-label="Explain resolution" data-tooltip="Sets how many text columns the animation uses. Higher values look sharper but take longer to render.">i</button></span>
              <input id="width" type="range" min="40" max="180" value="110" />
              <strong id="width-value">110</strong>
            </label>

            <label>
              <span class="label-row">Detail<button type="button" class="info-icon" aria-label="Explain detail" data-tooltip="Controls how many characters from the selected charset are used. More detail gives smoother shading.">i</button></span>
              <input id="detail" type="range" min="10" max="100" value="75" />
              <strong id="detail-value">75%</strong>
            </label>

            <label>
              <span class="label-row">FPS<button type="button" class="info-icon" aria-label="Explain FPS" data-tooltip="Sets playback speed for the converted animation. Higher FPS uses more frames and can increase conversion time.">i</button></span>
              <input id="fps" type="range" min="4" max="60" value="24" />
              <strong id="fps-value">24</strong>
            </label>

            <label>
              <span class="label-row">Brightness<button type="button" class="info-icon" aria-label="Explain brightness" data-tooltip="Lightens or darkens the source image before it becomes ASCII.">i</button></span>
              <input id="brightness" type="range" min="-100" max="100" value="8" />
              <strong id="brightness-value">8</strong>
            </label>

            <label>
              <span class="label-row">Contrast<button type="button" class="info-icon" aria-label="Explain contrast" data-tooltip="Pushes darks and lights apart. Higher contrast makes edges and silhouettes stand out more.">i</button></span>
              <input id="contrast" type="range" min="0" max="300" value="135" />
              <strong id="contrast-value">135</strong>
            </label>

            <label>
              <span class="label-row">Gamma<button type="button" class="info-icon" aria-label="Explain gamma" data-tooltip="Rebalances the midtones. Useful when details disappear in shadows or highlights.">i</button></span>
              <input id="gamma" type="range" min="20" max="280" value="100" />
              <strong id="gamma-value">1.00</strong>
            </label>
          </div>

          <div class="control-grid secondary">
            <label>
              <span class="label-row">Charset preset<button type="button" class="info-icon" aria-label="Explain charset preset" data-tooltip="Chooses the character family used to draw the image. Different presets create different textures.">i</button></span>
              <select id="charset-preset">
                <option value="detailed">@%#*+=-:. </option>
                <option value="blocks">█▓▒░ </option>
                <option value="terminal">$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~&lt;&gt;i!lI;:,\"^`'. </option>
                <option value="minimal">#*:. </option>
                <option value="custom">Custom</option>
              </select>
            </label>

            <label>
              <span class="label-row">Custom charset<button type="button" class="info-icon" aria-label="Explain custom charset" data-tooltip="Type your own characters from darkest to lightest. Used when the preset is set to Custom.">i</button></span>
              <input id="charset-custom" type="text" value="@%#*+=-:. " />
            </label>
          </div>

          <div class="control-grid secondary">
            <label>
              <span class="label-row">BG color<button type="button" class="info-icon" aria-label="Explain background color" data-tooltip="Sets the canvas color behind all ASCII characters.">i</button></span>
              <input id="background-color" type="color" value="#0a1015" />
            </label>

            <label>
              <span class="label-row">ASCII Subject<button type="button" class="info-icon" aria-label="Explain ASCII Subject" data-tooltip="Colors the lighter, non-animated ASCII characters that form the image background.">i</button></span>
              <input id="foreground-color" type="color" value="#f4ecd8" />
            </label>

            <label>
              <span class="label-row">ASCII BG<button type="button" class="info-icon" aria-label="Explain ASCII background" data-tooltip="Colors the denser subject/detail characters that appear to animate in front.">i</button></span>
              <input id="animated-color" type="color" value="#f5a65b" />
            </label>
          </div>

          <div class="toggle-row">
            <label class="checkbox">
              <input id="invert" type="checkbox" />
              <span>Invert</span>
            </label>
            <label class="checkbox">
              <input id="use-color" type="checkbox" checked />
              <span>Color ASCII</span>
            </label>
          </div>

          <div class="playback-row">
            <button id="play-toggle-button" disabled>Pause</button>
            <button id="loop-button" type="button" aria-pressed="true">Loop animation: On</button>
          </div>

          <div class="action-row action-row-wide">
            <button id="download-html-button" disabled>Download HTML</button>
            <button id="record-webm-button" disabled>Export MP4</button>
          </div>

          <div class="progress-wrap">
            <div class="progress-bar">
              <div id="progress-fill"></div>
            </div>
            <p id="status"></p>
          </div>
        </section>

        <section class="panel preview-panel">
          <div class="panel-head">
            <h2>Preview</h2>
            <p id="frame-counter"></p>
          </div>

          <div class="preview-stage">
            <pre id="ascii-output" aria-live="polite"></pre>
          </div>

          <video
            id="source-video"
            class="visually-hidden-media"
            playsinline
            webkit-playsinline="true"
            muted
            preload="metadata"
          ></video>
          <canvas id="frame-canvas" hidden></canvas>
          <canvas id="record-canvas" hidden></canvas>
        </section>
      </main>

      <footer class="site-footer">
        <p>Crafted by Hedirman of Futurebureau</p>
      </footer>
    </div>

    <div id="tooltip-layer" class="tooltip-layer" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
